# ──────────────────────────────────────────────────────────────────────────────
# GitHub Pages Deployment
# Runs ./gist build, then deploys the src/ directory to GitHub Pages.
# ──────────────────────────────────────────────────────────────────────────────
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Build ───────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      # ── Update Metadata ──────────────────────────────────────────────────
      - name: Update Metadata
        run: go run gist.go update-metadata

      - name: Commit metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update app metadata [skip ci]"
          file_pattern: 'src/**/index.html'

      - name: Run build
        run: go run gist.go build

      # ── Deploy ──────────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the built dist/ directory
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
