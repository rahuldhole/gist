name: Update App Metadata

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need at least 2 to see the diff

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Update Metadata
        run: go run gist.go update-metadata

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update app metadata timestamps [skip ci]"
          file_pattern: 'src/**/index.html'
