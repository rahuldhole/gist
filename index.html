<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gist Apps | App Directory</title>

    <link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><circle cx='50' cy='50' r='45' fill='none' stroke='%236366f1' stroke-width='5'/><path d='M50 15L85 50L50 85L15 50Z' fill='%236366f1' fill-opacity='0.2'/><text x='50' y='65' font-family='Arial' font-size='40' font-weight='bold' text-anchor='middle' fill='%236366f1'>G</text></svg>">

    <!-- Application Logic -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appDirectory', () => ({
                apps: [],
                search: '',
                category: '',
                loading: true,
                error: null,
                theme: localStorage.getItem('gist-theme') || 'system',

                async init() {
                    this.applyTheme();
                    try {
                        const response = await fetch('apps.json');
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        this.apps = await response.json();
                        
                        const spans = ['bento-span-4', 'bento-span-8', 'bento-span-4', 'bento-span-4', 'bento-span-6', 'bento-span-6'];
                        this.apps = this.apps.map((app, idx) => ({
                            ...app,
                            category: app.category && app.category.trim() !== '' ? app.category.trim() : 'Uncategorized',
                            _span: spans[Math.floor(Math.random() * spans.length)]
                        }));
                    } catch (e) {
                        this.error = 'Unable to load application directory. Run ./gist build first.';
                    } finally {
                        this.loading = false;
                    }
                },

                toggleTheme() {
                    if (this.theme === 'system') this.theme = 'dark';
                    else if (this.theme === 'dark') this.theme = 'light';
                    else this.theme = 'system';
                    
                    localStorage.setItem('gist-theme', this.theme);
                    this.applyTheme();
                },

                applyTheme() {
                    const isDark = this.theme === 'dark' || 
                        (this.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                    
                    if (isDark) {
                        document.body.classList.remove('light-mode');
                    } else {
                        document.body.classList.add('light-mode');
                    }
                },

                get uniqueCategories() {
                    const categories = this.apps.map(app => app.category).filter(Boolean);
                    return [...new Set(categories)].sort();
                },

                get filteredApps() {
                    return this.apps.filter(app => {
                        const matchesSearch = app.title.toLowerCase().includes(this.search.toLowerCase()) ||
                            app.description.toLowerCase().includes(this.search.toLowerCase());
                        const matchesCategory = this.category === '' || app.category === this.category;
                        return matchesSearch && matchesCategory;
                    });
                }
            }));
        });
    </script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-primary: #6366f1;
        --color-secondary: #a855f7;
        --color-accent: #f43f5e;
        --color-surface-950: #030712;
        --color-surface-900: #111827;
        --color-surface-800: #1f2937;
        --color-surface-700: #374151;
      }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }

        :root {
            --brand-glow: rgba(99, 102, 241, 0.15);
            --bg-color: #020617;
            --text-color: #f1f5f9;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --logo-secondary: #94a3b8;
            --accent-glow: rgba(168, 85, 247, 0.1);
        }

        .light-mode {
            --brand-glow: rgba(99, 102, 241, 0.08);
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.08);
            --logo-secondary: #64748b;
            --accent-glow: rgba(168, 85, 247, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: 
                radial-gradient(circle at 0% 0%, var(--brand-glow) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, var(--accent-glow) 0%, transparent 40%);
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-header {
            background: rgba(var(--bg-rgb, 2, 6, 23), 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-color);
        }

        .bento-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bento-card:hover {
            border-color: var(--color-primary);
            box-shadow: 
                0 0 0 1px var(--color-primary),
                0 20px 50px -10px var(--brand-glow);
            transform: translateY(-8px) scale(1.005);
            z-index: 10;
        }

        .bento-card-large { grid-column: span 12; }
        @media (min-width: 640px) { .bento-card-large { grid-column: span 6; } }
        @media (min-width: 1024px) { 
            .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
            .bento-span-4 { grid-column: span 4; }
            .bento-span-8 { grid-column: span 8; }
            .bento-span-6 { grid-column: span 6; }
            .bento-span-3 { grid-column: span 3; }
        }

        .search-input {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 20px var(--brand-glow);
            transform: scale(1.02);
        }

        .gist-icon-placeholder {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(2, 6, 23, 0.5) 100%);
        }

        .logo-play {
            color: var(--logo-secondary);
        }

        /* Float Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
    </style>
</head>

<body x-data="appDirectory" class="min-h-screen flex flex-col selection:bg-brand-500 selection:text-white">

    <!-- Sticky Glass Header -->
    <header class="sticky top-0 z-50 glass-header border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">

                <!-- Logo/Title -->
                <div class="flex items-center gap-3 group cursor-pointer" @click="window.location.reload()">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg group-hover:rotate-6 transition-transform">
                        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                    </div>
                    <h1 class="text-2xl font-black tracking-tight">
                        <span class="text-primary">Gist</span>
                        <span class="logo-play opacity-80">Play</span>
                    </h1>
                </div>

                <!-- Theme Toggle & Search -->
                <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                    <button @click="toggleTheme" 
                            class="p-2.5 rounded-xl border border-white/5 bg-surface-900/40 hover:bg-surface-800 transition-all flex items-center gap-2 group">
                        <i :class="theme === 'system' ? 'fa-solid fa-circle-half-stroke' : (theme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun')" 
                           class="text-primary text-sm group-hover:rotate-12 transition-transform"></i>
                        <span class="text-[10px] uppercase font-bold tracking-widest text-gray-500 group-hover:text-gray-300" x-text="theme"></span>
                    </button>
                    <!-- Search Input -->
                    <div class="relative w-full sm:w-64 md:w-80">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                        <input type="text" x-model="search" placeholder="Search apps..."
                            class="search-input block w-full pl-10 pr-3 py-2 rounded-xl leading-5 text-gray-300 placeholder-gray-500 focus:outline-none sm:text-sm transition-colors">
                    </div>

                    <!-- Category Filter -->
                    <select x-model="category"
                        class="search-input block w-full sm:w-40 pl-3 pr-10 py-2 text-base text-gray-300 focus:outline-none sm:text-sm rounded-xl transition-colors cursor-pointer appearance-none">
                        <option value="">All Categories</option>
                        <template x-for="cat in uniqueCategories" :key="cat">
                            <option :value="cat" x-text="cat"></option>
                        </template>
                    </select>
                </div>

            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">

        <!-- Loading State -->
        <div x-show="loading" class="flex flex-col justify-center items-center py-20" x-cloak>
            <svg class="animate-spin -ml-1 mr-3 h-10 w-10 text-brand-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="mt-4 text-gray-500 text-sm font-medium">Loading app directory...</p>
        </div>

        <!-- Error State -->
        <div x-show="error" class="flex flex-col items-center justify-center py-20 px-4 text-center" x-cloak>
            <div class="bg-red-500/10 p-5 rounded-full mb-5 border border-red-500/20">
                <svg class="w-12 h-12 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Failed to load apps</h3>
            <p class="text-gray-400 max-w-md mx-auto mb-6" x-text="error"></p>
            <button @click="loading = true; error = null; init()"
                class="px-6 py-2.5 bg-gray-800 hover:bg-gray-700 text-white rounded-xl transition-colors font-medium border border-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-500">
                Try Again
            </button>
        </div>

        <!-- Apps Grid (Bento Style) -->
        <div x-show="!loading && !error" class="bento-grid grid grid-cols-1 sm:grid-cols-2 gap-6" x-cloak>
            <template x-for="(app, index) in filteredApps" :key="app.path">
                <div 
                    x-data="{ imageBroken: false }"
                    x-init="gsap.from($el, { 
                        opacity: 0, 
                        y: 40, 
                        scale: 0.95, 
                        delay: index * 0.05, 
                        duration: 0.8, 
                        ease: 'back.out(1.2)' 
                    })"
                    :class="app._span"
                    class="h-full"
                >
                    <a :href="app.path"
                        class="bento-card group relative h-full rounded-[2rem] overflow-hidden focus:outline-none focus:ring-2 focus:ring-brand-500">
                        
                        <!-- Media Area -->
                        <div class="relative overflow-hidden flex items-center justify-center gist-icon-placeholder border-b border-white/5"
                             :class="app._span === 'bento-span-8' ? 'aspect-[2.5/1]' : 'aspect-video'">
                            
                            <!-- Image Support -->
                            <template x-if="app.image && !imageBroken">
                                <img :src="app.image" :alt="app.title" loading="lazy"
                                    @error="imageBroken = true"
                                    class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 ease-out">
                            </template>
                            
                            <!-- Icon Fallback -->
                            <template x-if="(!app.image || imageBroken) && app.icon">
                                <div class="w-full h-full flex items-center justify-center group-hover:scale-110 transition-transform duration-500">
                                    <i :class="app.icon + ' text-6xl text-brand-400 opacity-90 drop-shadow-[0_0_25px_rgba(99,102,241,0.5)]'"></i>
                                </div>
                            </template>
                            
                            <!-- System Fallback -->
                            <template x-if="(!app.image || imageBroken) && !app.icon">
                                <div class="w-full h-full flex items-center justify-center opacity-20 group-hover:opacity-40 transition-opacity">
                                    <svg class="w-20 h-20 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                                            d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                                    </svg>
                                </div>
                            </template>
    
                            <!-- Category Badge -->
                            <div class="absolute top-6 right-6 px-4 py-2 rounded-full category-badge bg-black/40 backdrop-blur-xl text-brand-300 border border-white/10 shadow-lg"
                                x-text="app.category"></div>
                        </div>
    
                        <!-- Content Area -->
                        <div class="p-8 flex flex-col flex-grow relative z-10 transition-colors group-hover:bg-white/5">
                            <h3 class="font-black mb-3 group-hover:text-primary transition-colors tracking-tighter"
                                :style="{ color: 'var(--text-color)' }"
                                :class="app._span === 'bento-span-8' ? 'text-4xl' : 'text-2xl'"
                                x-text="app.title"></h3>
                            
                            <!-- Resilient Description handling to avoid whitespace -->
                            <div class="flex-grow">
                                <template x-if="app.description">
                                    <p class="text-sm text-slate-400 line-clamp-3 leading-relaxed mb-6"
                                        x-text="app.description"></p>
                                </template>
                            </div>
    
                            <!-- Action Link -->
                            <div class="mt-auto flex items-center justify-between text-brand-400 font-black text-xs tracking-tighter">
                                <span class="group-hover:tracking-widest transition-all inline-flex items-center gap-3 uppercase">
                                    BOOT APP
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </a>
                </div>
            </template>
        </div>

        <!-- Empty Results State -->
        <div x-show="!loading && !error && filteredApps.length === 0" class="text-center py-20" x-cloak>
            <svg class="mx-auto h-12 w-12 text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="text-lg font-medium text-gray-300">No applications found</h3>
            <p class="mt-1 text-sm text-gray-500">Try adjusting your search or filter criteria.</p>
        </div>

    </main>

</body>

</html>
