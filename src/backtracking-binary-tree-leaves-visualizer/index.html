<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary Tree Paths Step Visualizer</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-slate-800">
  <div class="max-w-6xl mx-auto p-6 min-h-[calc(100vh-var(--gist-header-h,56px))]">
    <div id="app">
      <h1 class="text-3xl font-bold mb-4 text-center">Binary Tree Paths Step Visualizer</h1>
      
      <div class="mb-4 text-left">
        <label class="block mb-2 font-semibold">Tree Input (level-order, comma-separated, use null for empty nodes):</label>
        <input v-model="treeInput" @change="buildTree" class="w-full p-2 border rounded" placeholder="e.g. 1,2,3,null,5">
      </div>

      <div class="mb-4 flex gap-2 flex-wrap">
        <button @click="restart" class="bg-blue-600 text-white px-4 py-2 rounded">Restart</button>
        <button @click="pause" class="bg-yellow-500 text-white px-4 py-2 rounded">Pause</button>
        <button @click="resume" class="bg-green-600 text-white px-4 py-2 rounded">Resume</button>
        <button @click="prevStep" class="bg-gray-300 px-3 py-1 rounded">Prev Step</button>
        <button @click="nextStep" class="bg-gray-300 px-3 py-1 rounded">Next Step</button>
        <span class="ml-2 font-semibold">Speed:</span>
        <button @click="setSpeed('slow')" :class="speed==='slow'?'bg-green-600 text-white':'bg-gray-300'" class="px-3 py-1 rounded">Slow</button>
        <button @click="setSpeed('normal')" :class="speed==='normal'?'bg-green-600 text-white':'bg-gray-300'" class="px-3 py-1 rounded">Normal</button>
        <button @click="setSpeed('fast')" :class="speed==='fast'?'bg-green-600 text-white':'bg-gray-300'" class="px-3 py-1 rounded">Fast</button>
      </div>

      <div class="flex flex-col md:flex-row gap-4">
        <svg ref="svg" class="w-full md:w-2/3 h-[600px] border bg-white rounded shadow"></svg>

        <div class="md:w-1/3 flex flex-col gap-4 text-left">
          <div class="p-2 bg-white rounded shadow">
            <h2 class="text-xl font-bold mb-2">Current Path (track):</h2>
            <p class="font-mono text-blue-600">{{ currentTrack.join(' -> ') }}</p>
          </div>
          <div class="p-2 bg-white rounded shadow">
            <h2 class="text-xl font-bold mb-2">Saved Paths (res):</h2>
            <ul class="list-disc ml-6 font-mono text-green-700">
              <li v-for="p in currentRes" :key="p.join('-')">{{ p.join(' -> ') }}</li>
            </ul>
          </div>
          <div class="p-2 bg-white rounded shadow">
            <h2 class="text-xl font-bold mb-2">Step Info:</h2>
            <p>{{ stepInfo }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const treeInput = ref("1,2,3,4,5,6,7,null,8,9,null,10,11,12,13,null,null,14,15");
    const tree = ref(null);
    const svg = ref(null);
    const speed = ref("normal");
    const steps = reactive([]);
    const stepIndex = ref(-1);
    const playing = ref(false);
    const timer = ref(null);

    const currentTrack = reactive([]);
    const currentRes = reactive([]);
    const stepInfo = ref("");

    function setSpeed(s) { speed.value = s; }

    function delay() {
      switch(speed.value){
        case 'slow': return 1000;
        case 'fast': return 200;
        default: return 600;
      }
    }

    function buildTree() {
      steps.length = 0;
      stepIndex.value = -1;
      currentTrack.length = 0;
      currentRes.length = 0;

      const vals = treeInput.value.split(",").map(v => v.trim()==="null"?null:Number(v.trim()));
      if(!vals.length) return tree.value = null;
      let root = { val: vals[0], left:null, right:null, id:0 };
      let queue=[root]; let i=1,id=1;
      while(i<vals.length){
        const node=queue.shift();
        if(vals[i]!=null) node.left={val:vals[i],left:null,right:null,id:id++};
        i++;
        if(i<vals.length && vals[i]!=null) node.right={val:vals[i],left:null,right:null,id:id++};
        i++;
        if(node.left) queue.push(node.left);
        if(node.right) queue.push(node.right);
      }
      tree.value=root;
      generateSteps();
      drawTree();
    }

    function generateSteps(){
      steps.length=0;
      function dfs(node, path){
        if(!node) return;
        path.push(node.val);
        steps.push({type:'enter', node,nodeVal:node.val,path:[...path]});
        if(!node.left && !node.right){
          steps.push({type:'save', path:[...path]});
        }
        if(node.left) dfs(node.left,path);
        if(node.right) dfs(node.right,path);
        path.pop();
        steps.push({type:'back', node,nodeVal:node.val,path:[...path]});
      }
      dfs(tree.value,[]);
    }

    function drawTree(highlightNodeId=null, highlightEdges=[]){
      const width=900,height=600;
      const svgEl=d3.select(svg.value);
      svgEl.selectAll("*").remove();
      if(!tree.value) return;
      const root=d3.hierarchy(tree.value,d=>{const c=[]; if(d.left)c.push(d.left); if(d.right)c.push(d.right); return c.length?c:null;});
      const layout=d3.tree().size([width-40,height-40]);
      layout(root);
      svgEl.selectAll("line").data(root.links()).join("line")
        .attr("x1",d=>d.source.x+20)
        .attr("y1",d=>d.source.y+20)
        .attr("x2",d=>d.target.x+20)
        .attr("y2",d=>d.target.y+20)
        .attr("stroke","#999")
        .attr("stroke-width",2);
      svgEl.selectAll("circle").data(root.descendants()).join("circle")
        .attr("cx",d=>d.x+20)
        .attr("cy",d=>d.y+20)
        .attr("r",20)
        .attr("fill",d=>d.data.id===highlightNodeId?'#f87171':currentTrack.includes(d.data.val)?'#60a5fa':'#3b82f6')
        .attr("stroke","#333").attr("stroke-width",2);
      svgEl.selectAll("text").data(root.descendants()).join("text")
        .attr("x",d=>d.x+20).attr("y",d=>d.y+25)
        .attr("text-anchor","middle").attr("fill","#fff").attr("font-size","14px")
        .text(d=>d.data.val);
    }

    function applyStep(idx){
      const step=steps[idx];
      if(!step) return;
      if(step.type==='enter'){
        currentTrack.splice(0,currentTrack.length,...step.path);
        stepInfo.value=`Enter node ${step.nodeVal}`;
        drawTree(step.node.id);
      } else if(step.type==='save'){
        currentRes.push(step.path);
        stepInfo.value=`Save path: ${step.path.join(' -> ')}`;
      } else if(step.type==='back'){
        currentTrack.splice(0,currentTrack.length,...step.path);
        stepInfo.value=`Backtrack from node ${step.nodeVal}`;
        drawTree(step.node.id);
      }
    }

    async function playSteps(){
      playing.value=true;
      while(playing.value && stepIndex.value+1<steps.length){
        stepIndex.value++;
        applyStep(stepIndex.value);
        await new Promise(r=>setTimeout(r,delay()));
      }
      playing.value=false;
    }

    function pause(){ playing.value=false; }
    function resume(){ if(!playing.value) playSteps(); }
    function restart(){ pause(); stepIndex.value=-1; currentTrack.length=0; currentRes.length=0; drawTree(); }
    function nextStep(){ if(stepIndex.value+1<steps.length){ stepIndex.value++; applyStep(stepIndex.value); } }
    function prevStep(){ if(stepIndex.value>0){ stepIndex.value--; applyStep(stepIndex.value); } }

    onMounted(buildTree);
    return {treeInput,buildTree,svg,currentTrack,currentRes,stepInfo,setSpeed,speed,pause,resume,restart,nextStep,prevStep};
  }
}).mount("#app");
</script>
</body>
</html>
